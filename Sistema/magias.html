<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de magias</title>
</head>
<body>
    <div class="Main">
        <div class="toolbar">
            <ul>
                <li class="search">pesquisar</li>
                <li class="filter">filtrar</li>
            </ul>
        </div>
        <div class="container" id="MainContainer">

        </div>
    </div>
    <div class="sidebar">

    </div>
</body>
<script>
    class Magic{
        constructor(        name,
        cost,
        type,
        components,
        duration,
        range,
        modifiers){
            this.name = name
            this.type = type
            this.components = components
            this.duration = duration
            this.range = range
            this.modifiers = modifiers
        }
        name
        cost
        type
        components
        duration
        range
        modifiers
    }
    const MainContainer = document.getElementById("MainContainer")
    function createMagicCard(Magic)
    {
        const SpellContainer = document.createElement('Div')
        SpellContainer.classList.add("SpellContainer")
        MainContainer.appendChild(SpellContainer)

        const name = document.createElement('h1')
        SpellContainer.appendChild(name)
        name.classList.add("name")
        name.innerText = Magic.name

        const cost = document.createElement('h1')
        SpellContainer.appendChild(cost)
        cost.classList.add("cost")
        cost.innerText = Magic.cost

        const type = document.createElement('h1')
        SpellContainer.appendChild(type)
        type.classList.add("type")
        type.innerText = Magic.type

        return SpellContainer
    }
    function clearMain()
    {

    }
</script>
<style>
    body{
        margin: 0%;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: row;
    }
    .Main{
        width: 80vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }
    #MainContainer{
        width: 100%;
        height: 90vh;
        display: flex;
        border: 3px black;
        border-radius: 10px;
    }
    .SpellContainer{
        width: 40%;
        max-width: 200px;
        height: 100px;
        border: black 2px;
        border-radius: 10px;
    }
    @media screen and (max-width:475px){
        .SpellContainer{
        width: 100%;
        height: 100px;
        max-width: 1000px;
        border: black 2px;
        border-radius: 10px;
        margin: 2%;
        display: flex;
        flex-direction: column;
        }

    }
    .cost{
        font-size: 2rem;
    }
    .name{
        font-size: 3rem;
    }
    .type{
        font-size: 1rem;
    }


    .toolbar{
        width: 100%;
        height: 10vh;
    }


    .sidebar{
        width: 20vw;
        height: 100vh;
    }
</style>
</html>
