<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de magias</title>
</head>
<body>
    <div class="Main">
        <div class="toolbar">
            <ul>
                <li class="search">pesquisar</li>
                <li class="filter">filtrar</li>
            </ul>
        </div>
        <div class="container" id="MainContainer">

        </div>
    </div>
    <div class="sidebar">

    </div>
</body>
<script>
class Magic{
    constructor(name, cost, type, components, duration, range, modifiers, description){
        this.name = name
        this.cost = cost
        this.type = type
        this.components = components
        this.duration = duration
        this.range = range
        this.modifiers = modifiers
        this.description = description
    }
}

const MainContainer = document.getElementById("MainContainer")
let FilteredSpells = []
let AvailableSpells = []
let SelectedSpells = []

// =======================
// LAYOUT CONTROL
// =======================
function setLayout(mode){
    if(mode === "flex"){
        MainContainer.style.display = "flex"
        MainContainer.style.flexDirection = "column"
    } else {
        if(window.innerWidth > 600){
            MainContainer.style.display = "grid"
        } else {
            MainContainer.style.display = "flex"
            MainContainer.style.flexDirection = "column"
        }
    }
}

// =======================
// CREATE CARD
// =======================
function createMagicCard(Magic)
{
    const SpellContainer = document.createElement('div')
    SpellContainer.classList.add("SpellContainer")
    MainContainer.appendChild(SpellContainer)

    const name = document.createElement('h1')
    name.classList.add("name")
    name.innerText = Magic.name

    const cost = document.createElement('h1')
    cost.classList.add("cost")
    cost.innerText = "Custo: " + Magic.cost

    const type = document.createElement('h1')
    type.classList.add("type")
    type.innerText = Magic.type

    SpellContainer.appendChild(name)
    SpellContainer.appendChild(cost)
    SpellContainer.appendChild(type)

    SpellContainer.addEventListener("click", () => {
        clearMain()
        setLayout("flex")
        ShowSpell(Magic)
    })

    return SpellContainer
}

// =======================
// CLEAR
// =======================
function clearMain()
{
    MainContainer.innerHTML = ""
}

// =======================
// DETAIL VIEW
// =======================
function ShowSpell(Magic)
{
    const container = document.createElement("div")
    container.classList.add("SpellDetails")

    const basicInfoDiv = document.createElement("div")
    basicInfoDiv.classList.add("basicInfoDiv")

    const ButtonsDiv = document.createElement("div")
    ButtonsDiv.classList.add("ButtonsDiv")

    const name = document.createElement("h1")
    name.innerText = Magic.name

    const cost = document.createElement("p")
    cost.innerText = "Custo: " + Magic.cost

    const type = document.createElement("p")
    type.innerText = "Tipo: " + Magic.type

    const duration = document.createElement("p")
    duration.innerText = "Duração: " + Magic.duration

    const range = document.createElement("p")
    range.innerText = "Alcance: " + Magic.range

    const description = document.createElement("p")
    description.innerText = "Descrição: " + Magic.description
    description.classList.add("description")

    // BOTÃO VOLTAR
    const back = document.createElement('button')
    back.innerText = "Voltar"
    
    back.addEventListener("click", () => {
        clearMain()
        setLayout("grid")
        renderAllSpells(FilteredSpells)
    })

    // BOTÃO ADD / REMOVE
    const add = document.createElement('button')

    function updateButton(){
        if(SelectedSpells.includes(Magic)){
            add.innerText = "Remover"
        } else {
            add.innerText = "Adicionar"
        }
    }

    add.addEventListener("click", () => {
        if(SelectedSpells.includes(Magic)){
            SelectedSpells = SelectedSpells.filter(m => m !== Magic)
        } else {
            SelectedSpells.push(Magic)
        }
        updateButton()
    })

    updateButton()

    // montagem
    basicInfoDiv.appendChild(name)
    basicInfoDiv.appendChild(cost)
    basicInfoDiv.appendChild(type)
    basicInfoDiv.appendChild(duration)
    basicInfoDiv.appendChild(range)
    basicInfoDiv.appendChild(description)

    ButtonsDiv.appendChild(add)
    ButtonsDiv.appendChild(back)

    container.appendChild(basicInfoDiv)
    container.appendChild(ButtonsDiv)

    MainContainer.appendChild(container)
}

// =======================
// RENDER LIST
// =======================
function renderAllSpells(List){
    clearMain()
    setLayout("grid")
    List.forEach(m => createMagicCard(m))
}

// =======================
// INIT TEST DATA
// =======================
FilteredSpells.push(
    new Magic(
        "Fireball",
        10,
        "Ataque",
        [],
        "Instantâneo",
        "Longo",
        [],
        "Uma explosão de fogo que causa dano em área e pode incendiar inimigos."
    ),
    new Magic(
        "Heal",
        5,
        "Suporte",
        [],
        "Instantâneo",
        "Curto",
        [],
        "Restaura a vitalidade de um aliado, fechando feridas leves."
    ),
    new Magic(
        "Shield",
        8,
        "Defesa",
        [],
        "10s",
        "Pessoal",
        [],
        "Cria uma barreira mágica que absorve dano por um curto período."
    )
)
AvailableSpells = FilteredSpells

renderAllSpells(AvailableSpells)

// =======================
// RESPONSIVO DINÂMICO
// =======================

//==================
//Selecionar magias disponiveis da lista de magias
//==================
window.addEventListener("resize", () => {
    // só muda layout se estiver na lista
    if(MainContainer.children.length > 1){
        setLayout("grid")
    }
})
</script>
<style>
    body{
        margin: 0%;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: row;
    }
    .Main{
        width: 80vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }
    #MainContainer{
        width: 100%;
        height: 90vh;
        display: grid;
        border: 3px black;
        border-radius: 10px;
        overflow-y: scroll;
        overflow-x: auto;
        grid-template-columns: repeat(2,1fr);
        gap:10px 0px;
        align-content: start;
    }
    .SpellContainer{
        width: calc(100% - 20px);
        min-width: 200px;
        height: 150px;
        border: black 2px solid;
        border-radius: 10px;
        margin: 10px;
    }
    @media screen and (max-width:600px){
        .SpellContainer{
        width: 95%;
        height: 20%;
        max-width: none;
        min-height: 170px;
        margin: 2%;
        display: flex;
        flex-direction: column;
        }
        #MainContainer{
            flex-direction: column;
            display: flex;
        }
        .Main{
            width: 70vw;
        }
        .sidebar{
            width: 30vw !important;
            min-width: max-content;
        } 
    }
    .cost{
        font-size: 2rem;
        margin-left:5%;
        max-width: min-content;
    }
    .name{
        font-size: 3rem;
        margin-left:5%;
        margin-top: 5%;
        max-width: min-content;
    }
    .type{
        font-size: 1rem;
        margin-left:5%;
        max-width: min-content;
    }
    h1{
        margin: 0px;
        max-width: min-content;
    }

    .toolbar{
        width: 100%;
        height: 10vh;
    }

    .sidebar{
        width: 20vw;
        height: 100vh;
    }
</style>
</html>
