<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de magias</title>
</head>
<body>
    <div class="Main">
        <div class="toolbar">
            <ul>
                <li class="search">pesquisar</li>
                <li class="filter">filtrar</li>
            </ul>
        </div>
        <div class="container" id="MainContainer">

        </div>
    </div>
    <div class="sidebar">

    </div>
</body>
<script>
    class Magic{
        constructor(        name,
        cost,
        type,
        components,
        duration,
        range,
        modifiers){
            this.name = name
            this.type = type
            this.components = components
            this.duration = duration
            this.range = range
            this.modifiers = modifiers
        }
        name
        cost
        type
        components
        duration
        range
        modifiers
    }
    const MainContainer = document.getElementById("MainContainer")
    let AvailableSpells = []
    function createMagicCard(Magic)
    {
        const SpellContainer = document.createElement('Div')
        SpellContainer.classList.add("SpellContainer")
        MainContainer.appendChild(SpellContainer)

        const name = document.createElement('h1')
        SpellContainer.appendChild(name)
        name.classList.add("name")
        name.innerText = Magic.name

        const cost = document.createElement('h1')
        SpellContainer.appendChild(cost)
        cost.classList.add("cost")
        cost.innerText = "Custo:" + Magic.cost

        const type = document.createElement('h1')
        SpellContainer.appendChild(type)
        type.classList.add("type")
        type.innerText = Magic.type

        SpellContainer.addEventListener("click",(ev) => {
            clearMain()
            ShowSpell(Magic)

        })

        return SpellContainer
    }
    function clearMain()
    {
        AvailableSpells = []
        MainContainer.innerHTML = ""
    }
    function ShowSpell(Magic)
    {
    const container = document.createElement("div")
    container.classList.add("SpellDetails")

    const name = document.createElement("h1")
    name.innerText = Magic.name

    const cost = document.createElement("p")
    cost.innerText = "Custo: " + Magic.cost

    const type = document.createElement("p")
    type.innerText = "Tipo: " + Magic.type

    const duration = document.createElement("p")
    duration.innerText = "Duração: " + Magic.duration

    const range = document.createElement("p")
    range.innerText = "Alcance: " + Magic.range

    container.appendChild(name)
    container.appendChild(cost)
    container.appendChild(type)
    container.appendChild(duration)
    container.appendChild(range)

    MainContainer.appendChild(container)
    const mode = MainContainer.style.display = "flex";
    console.log(mode)

        if(mode === "flex"){
        MainContainer.style.display = "flex"
        MainContainer.style.flexDirection = "column"
    }
    else if(mode === "grid"){
        if(window.innerWidth > 600){
            MainContainer.style.display = "grid"
        } else {
            MainContainer.style.display = "flex"
            MainContainer.style.flexDirection = "column"
        }
    }
}
    function renderAllSpells(){
    AvailableSpells.forEach(m => createMagicCard(m))
}

</script>
<style>
    body{
        margin: 0%;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: row;
    }
    .Main{
        width: 80vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }
    #MainContainer{
        width: 100%;
        height: 90vh;
        display: grid;
        border: 3px black;
        border-radius: 10px;
        overflow-y: scroll;
        overflow-x: auto;
        grid-template-columns: repeat(2,1fr);
        gap:10px 0px;
        align-content: start;
    }
    .SpellContainer{
        width: calc(100% - 20px);
        min-width: 200px;
        height: 150px;
        border: black 2px solid;
        border-radius: 10px;
        margin: 10px;
    }
    @media screen and (max-width:600px){
        .SpellContainer{
        width: 95%;
        height: 20%;
        max-width: none;
        min-height: 170px;
        margin: 2%;
        display: flex;
        flex-direction: column;
        }
        #MainContainer{
            flex-direction: column;
            display: flex;
        }
        .Main{
            width: 70vw;
        }
        .sidebar{
            width: 30vw !important;
            min-width: max-content;
        } 
    }
    .cost{
        font-size: 2rem;
        margin-left:5%;
        max-width: min-content;
    }
    .name{
        font-size: 3rem;
        margin-left:5%;
        margin-top: 5%;
        max-width: min-content;
    }
    .type{
        font-size: 1rem;
        margin-left:5%;
        max-width: min-content;
    }
    h1{
        margin: 0px;
        max-width: min-content;
    }

    .toolbar{
        width: 100%;
        height: 10vh;
    }

    .sidebar{
        width: 20vw;
        height: 100vh;
    }
</style>
</html>
